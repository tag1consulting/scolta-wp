name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  check-wp-version:
    name: Check WordPress version currency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Tested up to matches current WordPress
        run: |
          WP_CURRENT=$(curl -s "https://api.wordpress.org/core/version-check/1.7/" \
            | python3 -c "import sys,json; v=json.load(sys.stdin)['offers'][0]['version']; print('.'.join(v.split('.')[:2]))")
          echo "Current WordPress version: $WP_CURRENT"

          TESTED=$(grep -i 'Tested up to:' readme.txt | head -1 | sed 's/.*: *//' | tr -d '[:space:]')
          echo "Plugin Tested up to: $TESTED"

          if [ "$TESTED" != "$WP_CURRENT" ]; then
            echo "ERROR: readme.txt 'Tested up to: $TESTED' does not match current WordPress $WP_CURRENT"
            echo "Update readme.txt before releasing. wordpress.org rejects plugins with outdated Tested up to values."
            exit 1
          fi
          echo "OK: Tested up to matches current WordPress version."

  lock-guard:
    name: Verify scolta-php lock source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scolta-php is stable and from Packagist
        run: |
          python3 - <<'PY'
          import json,sys,re
          lock=json.load(open("composer.lock"))
          pkgs=lock.get("packages",[])+lock.get("packages-dev",[])
          p=next((x for x in pkgs if x["name"]=="tag1/scolta-php"),None)
          if not p: sys.exit("scolta-php not in lock")
          dist=(p.get("dist") or {}).get("type")
          ver=p.get("version","")
          bad=[]
          if dist=="path": bad.append(f"dist.type=path ({(p.get('dist') or {}).get('url')})")
          if not re.fullmatch(r"\d+\.\d+\.\d+", ver): bad.append(f"non-stable version {ver}")
          if bad: sys.exit("LOCK GUARD FAILED for tag1/scolta-php: "+"; ".join(bad))
          print(f"Lock guard OK: tag1/scolta-php {ver} via {dist}")
          PY

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: [check-wp-version, lock-guard]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl
          coverage: none

      - name: Install dependencies (no dev)
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          STAGE=$(mktemp -d)
          PKG="scolta"

          # Root files — enumerated allowlist
          for f in scolta.php readme.txt LICENSE composer.json composer.lock \
                   uninstall.php README.md; do
            [ -f "$f" ] && cp "$f" "$STAGE/"
          done

          # Source dirs — PHP only
          for dir in admin includes cli; do
            if [ -d "$dir" ]; then
              find "$dir" -name '*.php' | while read -r f; do
                mkdir -p "$STAGE/$(dirname "$f")"
                cp "$f" "$STAGE/$f"
              done
            fi
          done

          # Assets — CSS, JS, WASM only
          if [ -d "assets" ]; then
            find assets \( -name '*.css' -o -name '*.js' -o -name '*.wasm' \) | while read -r f; do
              mkdir -p "$STAGE/$(dirname "$f")"
              cp "$f" "$STAGE/$f"
            done
          fi

          # vendor/ — full tree minus dev cruft
          cp -a vendor "$STAGE/vendor"
          find "$STAGE/vendor" -type d \( -name tests -o -name test \) -exec rm -rf {} + 2>/dev/null || true
          find "$STAGE/vendor" \( \
            -name 'phpunit.xml*' -o -name 'phpstan.neon*' -o -name '.php-cs-fixer*' \
            -o -name '*.sha256' -o -name '*.toml' -o -name '.deepsource.toml' \
          \) -delete 2>/dev/null || true

          # Exclude duplicate WASM from vendor (plugin ships its own copy in assets/wasm/)
          rm -rf "$STAGE/vendor/tag1/scolta-php/assets/wasm" 2>/dev/null || true

          cd "$(dirname "$STAGE")"
          mv "$STAGE" "$PKG"
          zip -r "$OLDPWD/$PKG-${VERSION}.zip" "$PKG/"

      - name: Extract CHANGELOG entry
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release-notes.txt
          cat release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: scolta-*.zip
          fail_on_unmatched_files: true

  validate-zip:
    name: Validate release archive
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download release asset
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for i in 1 2 3 4 5; do
            gh release download "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --pattern "scolta-${VERSION}.zip" \
              --output scolta.zip && break
            echo "Retry $i/5..."
            sleep 5
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate archive structure
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          unzip -l scolta.zip > zip-contents.txt
          cat zip-contents.txt

          # Top-level directory must be scolta/
          if ! grep -qE '^[[:space:]]+[0-9].*scolta/$' zip-contents.txt; then
            echo "ERROR: Top-level directory is not scolta/"
            exit 1
          fi

          # vendor/autoload.php must be present
          if ! grep -q 'scolta/vendor/autoload.php' zip-contents.txt; then
            echo "ERROR: vendor/autoload.php is missing from archive"
            exit 1
          fi

          # Main plugin file must be present
          if ! grep -q 'scolta/scolta.php' zip-contents.txt; then
            echo "ERROR: scolta.php is missing from archive"
            exit 1
          fi

          # WASM must be present at the canonical plugin location
          if ! grep -q 'scolta/assets/wasm/scolta_core_bg.wasm' zip-contents.txt; then
            echo "ERROR: scolta_core_bg.wasm is missing from assets/wasm/"
            exit 1
          fi

          # WASM must not be duplicated from vendor/tag1/scolta-php/assets/wasm/
          if grep -q 'scolta/vendor/tag1/scolta-php/assets/wasm/' zip-contents.txt; then
            echo "ERROR: Archive contains duplicate WASM from vendor/tag1/scolta-php/assets/wasm/:"
            grep 'scolta/vendor/tag1/scolta-php/assets/wasm/' zip-contents.txt
            exit 1
          fi

          # No nested vendor/ directories inside vendor packages
          if grep -qE 'scolta/vendor/[^/]+/vendor/' zip-contents.txt; then
            echo "ERROR: Archive contains nested vendor/ directories (path-repo build leak):"
            grep -E 'scolta/vendor/[^/]+/vendor/' zip-contents.txt | head -20
            exit 1
          fi

          # No tests/ or test/ content in vendor directories
          if grep -qE 'scolta/vendor/.+/tests/' zip-contents.txt; then
            echo "ERROR: Archive contains vendor tests/ content (must be excluded):"
            grep -E 'scolta/vendor/.+/tests/' zip-contents.txt
            exit 1
          fi
          if grep -qE 'scolta/vendor/.+/test/' zip-contents.txt; then
            echo "ERROR: Archive contains vendor test/ content (must be excluded):"
            grep -E 'scolta/vendor/.+/test/' zip-contents.txt
            exit 1
          fi

          # Disallowed extensions (WP.org review requirements)
          FAIL=0
          for ext in '.sha256' '.toml' '.dist' '.neon'; do
            if grep -qE "\\${ext}$" zip-contents.txt; then
              echo "ERROR: Archive contains ${ext} files:"
              grep -E "\\${ext}$" zip-contents.txt
              FAIL=1
            fi
          done
          if grep -qE 'phpunit\.xml' zip-contents.txt; then
            echo "ERROR: Archive contains phpunit.xml files:"
            grep -E 'phpunit\.xml' zip-contents.txt
            FAIL=1
          fi
          if grep -q '\.log$' zip-contents.txt; then
            echo "ERROR: Archive contains .log files:"
            grep '\.log$' zip-contents.txt
            FAIL=1
          fi
          # Dependency LICENSE files are ALLOWED (required by their licenses)
          # .wasm files are ALLOWED (runtime asset)
          # .pagefind files are ALLOWED (bundled indexer runtime)
          [ $FAIL -eq 1 ] && exit 1

          # ZIP must be under 5 MB (rc4 was 2.2 MB; 5 MB gives headroom for growth)
          ZIP_SIZE=$(stat --format=%s scolta.zip 2>/dev/null || stat -f%z scolta.zip 2>/dev/null)
          MAX_SIZE=$((5 * 1024 * 1024))
          if [ "$ZIP_SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: ZIP is $(( ZIP_SIZE / 1024 / 1024 )) MB — exceeds 5 MB limit."
            echo "This usually means dev dependencies or test fixtures leaked into the archive."
            echo "Top 20 largest files:"
            unzip -l scolta.zip | sort -rn -k1 | head -20
            exit 1
          fi
          echo "ZIP size OK: $(( ZIP_SIZE / 1024 )) KB"

          echo "Archive structure OK: correct directory, vendor/autoload.php, scolta.php all present, no forbidden files."
