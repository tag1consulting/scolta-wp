# AI PR Review — unified single-file setup (container-action variant)
#
# Copy this file to .github/workflows/ai-pr-review.yml in your repo.
#
# This single file handles BOTH automatic PR reviews (on pull_request) AND slash
# commands (/ai-pr-review rescan, dismiss, etc.) via per-job event gating.  You do
# not need a second workflow file.
#
# This variant pulls a pinned container image from GHCR, which provides
# version-pinned analyzer binaries (shellcheck, semgrep, trufflehog, ruff,
# golangci-lint).  If you prefer to run on the Actions runner without Docker,
# use the root action instead: tag1consulting/ai-pr-review@main
#
# ── Secrets ──────────────────────────────────────────────────────────────────
#
#   AI_REVIEW_API_KEY  (or ANTHROPIC_API_KEY) — your LLM provider API key.
#     The workflow accepts either name, so existing secrets work without rename.
#
#   GH_TOKEN  — a PAT with repo scope (classic) or pull_requests:write +
#     metadata:read (fine-grained).  Required ONLY for the dismiss command's
#     resolveReviewThread GraphQL mutation.  Omit it if you do not use dismiss.
#     GITHUB_TOKEN cannot be used here because GitHub blocks the resolveReviewThread
#     mutation from pull_request_review_comment events.
#
# ── Optional repo variables (Settings → Variables) ───────────────────────────
#
#   AI_REVIEW_PROVIDER           — LLM provider (default: anthropic)
#   AI_REVIEW_BASE_URL           — custom endpoint for openai-compatible/bedrock-proxy
#   AI_REVIEW_IMAGE_TAG          — container image tag (default: latest)
#   AI_REVIEW_MODEL_STANDARD     — override standard model ID
#   AI_REVIEW_MODEL_PREMIUM      — override premium model ID (full mode only)
#   AI_REVIEW_MAX_DIFF_LINES     — skip review when diff exceeds N lines (default: 5000)
#   AI_REVIEW_MAX_INLINE         — max inline comments per run (default: 25)
#   AI_REVIEW_MAX_TOKENS_PER_AGENT — output token budget per LLM agent (default: 16384)
#   AI_REVIEW_ENABLE_SUGGESTIONS — "Apply suggestion" buttons on inline comments (default: true)
#   AI_REVIEW_PARALLEL           — parallel tiered fan-out (default: true)
#   AI_REVIEW_IGNORE_MERGE_COMMITS — strip upstream base-branch merge commits (default: true)
#   AI_REVIEW_FAIL_ON_FINDINGS   — exit code 2 on REQUEST_CHANGES/COMMENT, for CI gates (default: true)
#   AI_REVIEW_MODE_DEFAULT       — default mode used when /ai-pr-review rescan fires (default: quick)
#   AI_REVIEW_FEEDBACK_LOOP      — enable learning loop (default: false; GitHub-only)
#   AI_REVIEW_CONTEXT_ENRICHMENT — tree-sitter symbol-context injection (default: true)
#   AI_REVIEW_CONTEXT_MAX_QUERIES — cap on symbol-lookup queries per run (default: 200)
#   AI_REVIEW_SARIF_PATHS        — comma-separated SARIF 2.1.0 paths to merge as findings
#   AI_REVIEW_EXCLUDE_PATTERNS   — comma-separated glob patterns to exclude from the diff
#   AI_REVIEW_EXCLUDE_PATTERNS_MODE — 'append' (default) or 'replace' for exclude-patterns
#   AI_REVIEW_ANALYZER_DIFF_SCOPE — how out-of-diff analyzer findings are handled (default: cap)
#   AI_REVIEW_ANALYZERS          — allowlist of static analyzers to run (comma-separated; empty = all)
#   AI_REVIEW_EXCLUDE_ANALYZERS  — denylist of analyzers to skip (e.g. 'phpstan,phpcs')
#   AI_REVIEW_AGENTS             — allowlist of review agents to run (comma-separated; empty = all)
#   AI_REVIEW_EXCLUDE_AGENTS     — denylist of review agents to skip
#
# ── Default branch note ──────────────────────────────────────────────────────
#
# issue_comment and pull_request_review_comment workflows run from the DEFAULT
# BRANCH only.  Slash commands will not respond until this file is merged to
# your default branch.  The automatic PR review (pull_request trigger) fires
# immediately after the file is pushed to any branch, including a PR branch.
#
# ── Fork PR support (pull_request_target) ────────────────────────────────────
#
# The pull_request trigger below does NOT run on fork PRs in repos where the
# fork contributor cannot create secrets.  To enable reviews on fork PRs,
# switch to pull_request_target — but ONLY after adding the security hardening
# shown in the commented block below.  Running pull_request_target without
# hardening exposes your secrets to PR authors.
#
# To opt in:
#   1. Replace the "on: pull_request:" block with "on: pull_request_target:".
#   2. Replace the simple checkout step and container-action step in the review
#      job with the hardened variant shown in the commented block below.
#
# --- HARDENED pull_request_target variant (replace steps in review job) -----
# steps:
#   - uses: actions/checkout@v4
#     with:
#       fetch-depth: 0
#       ref: ${{ github.event.pull_request.head.sha }}
#       persist-credentials: false
#
#   # Restore trusted container-action from the base branch so a fork PR
#   # cannot substitute a malicious action.yml.
#   - name: Restore trusted container-action
#     if: github.event_name == 'pull_request_target'
#     env:
#       BASE_SHA: ${{ github.event.pull_request.base.sha }}
#     run: git checkout "$BASE_SHA" -- container-action/
#
#   - name: Run AI review
#     uses: tag1consulting/ai-pr-review/container-action@main
#     # ... (same with: block as below)
# ----------------------------------------------------------------------------

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ── Automatic PR review ────────────────────────────────────────────────────
  # Fires only on pull_request events.  Skips drafts and PRs labeled
  # 'skip-ai-review'.  The slash-commands job below is skipped on this event.
  review:
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI review
        uses: tag1consulting/ai-pr-review/container-action@main
        env:
          FORCE_FULL_DIFF: ${{ contains(github.event.pull_request.labels.*.name, 'ai-review-rescan') }}
        with:
          # AI_REVIEW_IMAGE_TAG: container image tag (default: latest)
          # Set to 'dev' to dogfood pre-release builds, or pin to a release
          # tag (e.g. '1.6.0') for reproducibility.
          image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
          # --- Provider ---
          # Set AI_REVIEW_API_KEY (or ANTHROPIC_API_KEY) as a repository secret.
          api-key: ${{ secrets.AI_REVIEW_API_KEY || secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ github.token }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          # --- Optional repo variables (set in Settings → Variables) ---
          # AI_REVIEW_PROVIDER: LLM provider (default: anthropic)
          provider: ${{ vars.AI_REVIEW_PROVIDER || 'anthropic' }}
          # AI_REVIEW_BASE_URL: custom endpoint for openai-compatible or bedrock-proxy
          base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
          # AI_REVIEW_MODEL_STANDARD / AI_REVIEW_MODEL_PREMIUM: override provider defaults
          model-standard: ${{ vars.AI_REVIEW_MODEL_STANDARD || '' }}
          model-premium: ${{ vars.AI_REVIEW_MODEL_PREMIUM || '' }}
          # Auto-select full mode for release PRs; customize the branch pattern
          # for your repo's convention. See README "Auto-detecting release PRs".
          review-mode: >-
            ${{
              contains(github.event.pull_request.labels.*.name, 'ai-review-full') && 'full' ||
              startsWith(github.event.pull_request.head.ref, 'release/') && 'full' ||
              'quick'
            }}
          # AI_REVIEW_MAX_DIFF_LINES: skip review when diff exceeds this many lines (default: 5000)
          max-diff-lines: ${{ vars.AI_REVIEW_MAX_DIFF_LINES || '5000' }}
          # AI_REVIEW_MAX_INLINE: max inline comments per run; excess goes to summary (default: 25)
          max-inline: ${{ vars.AI_REVIEW_MAX_INLINE || '25' }}
          # AI_REVIEW_MAX_TOKENS_PER_AGENT: output token budget per LLM agent (default: 16384)
          max-tokens-per-agent: ${{ vars.AI_REVIEW_MAX_TOKENS_PER_AGENT || '16384' }}
          # AI_REVIEW_ENABLE_SUGGESTIONS: "Apply suggestion" buttons on inline comments (default: true)
          enable-suggestions: ${{ vars.AI_REVIEW_ENABLE_SUGGESTIONS || 'true' }}
          # AI_REVIEW_PARALLEL: parallel tiered fan-out; set false to go sequential (default: true)
          parallel: ${{ vars.AI_REVIEW_PARALLEL || 'true' }}
          # AI_REVIEW_IGNORE_MERGE_COMMITS: strip upstream base-branch merges from diff (default: true)
          ignore-merge-commits: ${{ vars.AI_REVIEW_IGNORE_MERGE_COMMITS || 'true' }}
          # AI_REVIEW_FAIL_ON_FINDINGS: exit code 2 on REQUEST_CHANGES/COMMENT, for CI
          # gates (e.g. blocking Renovate auto-merge until the bot approves) (default: true).
          # Set AI_REVIEW_FAIL_ON_FINDINGS=false to make the review job non-blocking.
          fail-on-findings: ${{ vars.AI_REVIEW_FAIL_ON_FINDINGS || 'true' }}
          # --- Capabilities (Python engine only — the default since v1.0.0) ---
          # AI_REVIEW_CONTEXT_ENRICHMENT: tree-sitter + ripgrep symbol-context injection
          # (default: true — matches the container image's own default, since it ships
          # both tree-sitter-language-pack and ripgrep). Set to false to disable.
          context-enrichment: ${{ vars.AI_REVIEW_CONTEXT_ENRICHMENT || 'true' }}
          # AI_REVIEW_CONTEXT_MAX_QUERIES: cap on ripgrep symbol-lookup queries per run,
          # shared across all agents (default: 200). Increase if logs show
          # "context enrichment: max_queries=N reached; remaining symbols skipped".
          context-max-queries: ${{ vars.AI_REVIEW_CONTEXT_MAX_QUERIES || '200' }}
          # AI_REVIEW_SARIF_PATHS: comma-separated SARIF 2.1.0 file paths to merge as findings
          # Example: 'results/codeql.sarif,results/trivy.sarif'
          sarif-paths: ${{ vars.AI_REVIEW_SARIF_PATHS || '' }}
          # AI_REVIEW_EXCLUDE_PATTERNS: comma-separated glob patterns to exclude from the diff
          # Example: 'docs/*,*.generated.go,generated/**'
          exclude-patterns: ${{ vars.AI_REVIEW_EXCLUDE_PATTERNS || '' }}
          # AI_REVIEW_EXCLUDE_PATTERNS_MODE: 'append' (default) or 'replace'
          exclude-patterns-mode: ${{ vars.AI_REVIEW_EXCLUDE_PATTERNS_MODE || 'append' }}
          # AI_REVIEW_ANALYZER_DIFF_SCOPE: how to handle native-analyzer findings outside changed lines
          # 'cap' (default): downgrade to Low; 'drop': remove; 'off': pass through unchanged
          analyzer-diff-scope: ${{ vars.AI_REVIEW_ANALYZER_DIFF_SCOPE || 'cap' }}
          # AI_REVIEW_FEEDBACK_LOOP: load past learning-loop entries and inject into agent prompts
          feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
          # --- Analyzer / agent filtering (Python engine) ---
          # These are forwarded to rescan and review-full via the slash-commands job below
          # so both paths honor the same filtering without manual duplication.
          analyzers: ${{ vars.AI_REVIEW_ANALYZERS || '' }}
          exclude-analyzers: ${{ vars.AI_REVIEW_EXCLUDE_ANALYZERS || '' }}
          agents: ${{ vars.AI_REVIEW_AGENTS || '' }}
          exclude-agents: ${{ vars.AI_REVIEW_EXCLUDE_AGENTS || '' }}

  # ── Slash commands ─────────────────────────────────────────────────────────
  # Fires only on issue_comment and pull_request_review_comment events.
  # The review job above is skipped on those events.
  #
  # Supported commands (post as a PR comment):
  #   /ai-pr-review rescan     — force full diff, re-run review
  #   /ai-pr-review review-full — run in full mode (all agents)
  #   /ai-pr-review skip       — add skip-ai-review label to suppress next review
  #   /ai-pr-review dismiss    — reply to an inline finding to dismiss it
  #   /ai-pr-review dismiss F<n> — dismiss a body-level finding by its stable ID
  #   /ai-pr-review help       — post the command list as a reply
  #   /ai-pr-review false-positive [F<n>] [reason]  — record a false-positive verdict
  #   /ai-pr-review wont-fix [F<n>] [reason]        — record a "won't fix" verdict
  #   /ai-pr-review feedback <text>                 — store free-form feedback
  slash-commands:
    if: >-
      startsWith(github.event.comment.body, '/ai-pr-review') &&
      contains(
        fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
        github.event.comment.author_association
      ) &&
      (github.event_name == 'pull_request_review_comment' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request))
    uses: tag1consulting/ai-pr-review/.github/workflows/slash-commands.yml@main
    with:
      event-name: ${{ github.event_name }}
      comment-body: ${{ github.event.comment.body }}
      comment-id: ${{ github.event.comment.id }}
      comment-author-association: ${{ github.event.comment.author_association }}
      issue-number: ${{ github.event.issue.number || '' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      in-reply-to-id: ${{ github.event.comment.in_reply_to_id || '' }}
      is-pull-request: ${{ github.event.issue.pull_request && 'true' || 'false' }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      repository-name: ${{ github.event.repository.name }}
      actor-login: ${{ github.event.comment.user.login }}
      # --- Optional repo variables (same as the review job above) ---
      provider: ${{ vars.AI_REVIEW_PROVIDER || 'anthropic' }}
      base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
      image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
      review-mode-default: ${{ vars.AI_REVIEW_MODE_DEFAULT || 'quick' }}
      # --- Learning loop (Capability C) ---
      # AI_REVIEW_FEEDBACK_LOOP gates the feedback-command job which handles
      # /ai-pr-review false-positive | wont-fix | feedback | explain | revise.
      # Persistent feedback commands require GH_TOKEN with contents:write on
      # the ai-pr-review-bot branch. OWNER/MEMBER only (enforced upstream).
      enable-feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
      # --- Analyzer / agent filtering (Python engine) ---
      # Forwarded to rescan and review-full to keep them in sync with the
      # main review above. Set the repo variables once, both paths stay aligned.
      analyzers: ${{ vars.AI_REVIEW_ANALYZERS || '' }}
      exclude-analyzers: ${{ vars.AI_REVIEW_EXCLUDE_ANALYZERS || '' }}
      agents: ${{ vars.AI_REVIEW_AGENTS || '' }}
      exclude-agents: ${{ vars.AI_REVIEW_EXCLUDE_AGENTS || '' }}
    secrets:
      # Accept either AI_REVIEW_API_KEY or ANTHROPIC_API_KEY — both work.
      api-key: ${{ secrets.AI_REVIEW_API_KEY || secrets.ANTHROPIC_API_KEY }}
      # GH_TOKEN must be a PAT (repo scope) or GitHub App token — not GITHUB_TOKEN.
      # Required only for the dismiss command's resolveReviewThread mutation.
      # See: docs/slash-commands.md#pat-requirement
      github-token: ${{ secrets.GH_TOKEN }}
      # Built-in GITHUB_TOKEN: used for plain comment posts, reactions, reads,
      # and label changes so those operations post as github-actions[bot]. Optional
      # (the callee falls back to its own github.token if omitted) but recommended,
      # since the fallback still works but is a weaker guarantee of bot identity.
      actions-token: ${{ secrets.GITHUB_TOKEN }}
